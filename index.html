<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyblade X inventario - By ManuHBK</title>
    <link rel="icon" type="image/jpeg" href="LOGO.jpg">
    <style>
        :root {
            /* === Paleta Litoral Premium y Enérgica === */
            --bg-main: #060b13;        /* Azul abisal (casi negro) para contraste extremo */
            --bg-card: #0f1c30;        /* Azul océano profundo para las tarjetas */
            --bg-input: #15253f;       /* Azul marino intermedio para buscadores y campos */
            --text-primary: #ffffff;   /* Blanco puro de alta legibilidad */
            --text-secondary: #a0aec0; /* Gris azulado sutil para descripciones y subtítulos */
            
            /* === Colores de Identidad Beyblade X === */
            --accent-bx: #38bdf8;      /* Celeste brillante (Energía Gear Sports) */
            --accent-ux: #fbbf24;      /* Oro arena / Unique Line */
            --accent-cx: #2dd4bf;      /* Turquesa agua / Custom Line */
            --accent-glow: #3b82f6;    /* Azul de carga para efectos de luz */
            
            --border-color: #1e3a5f;   /* Borde metálico oceánico */
            --border-hover: #3b82f6;   /* Borde al pasar el mouse */
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Fondo con sutil gradiente marino y textura de líneas de estadio X */
            background-image: 
                radial-gradient(circle at 50% 0%, #102a45 0%, #060b13 70%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 4px;
        }

        .container {
            width: 100%;
            max-width: 680px;
        }

        /* === CONTENEDOR Y ESTILO DEL LOGO === */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .community-logo {
            width: 110px;                  
            height: 110px;
            object-fit: cover;
            border-radius: 50%;            
            border: 2px solid var(--accent-bx); 
            box-shadow: 
                0 0 15px rgba(56, 189, 248, 0.3), 
                0 4px 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .community-logo:hover {
            transform: scale(1.05) rotate(3deg);
            border-color: var(--accent-ux); 
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        /* === TÍTULO PRINCIPAL ESTILO LIGA === */
        h1 {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 0;
            margin-bottom: 5px;
            text-align: center;
            background: linear-gradient(135deg, #ffffff 30%, var(--accent-bx));
            
            /* REEMPLAZA O AGREGA ESTAS DOS LÍNEAS AQUÍ: */
            -webkit-background-clip: text;
            background-clip: text; /* <--- Esta es la línea estándar que te pide */
            
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ========================================================
           PANEL DE ESTADÍSTICAS RADICAL (Efecto Cristal de Arena)
           ======================================================== */
        .stats-panel {
            background: linear-gradient(135deg, rgba(15, 28, 48, 0.85), rgba(6, 11, 19, 0.95));
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 20px !important; 
            margin-bottom: 25px;
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-around !important; 
            align-items: center !important;
            text-align: center;
            box-shadow: 
                0 10px 25px -5px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
        }

        .stats-panel > div > h3 {
            color: var(--text-secondary) !important;
            font-size: 12px !important;
            font-weight: 700 !important;
            text-transform: uppercase !important;
            letter-spacing: 1.5px !important;
            margin: 0 0 4px 0 !important;
        }

        .stats-panel > div > p {
            color: var(--accent-ux) !important; /* Dorado Arena de Playa */
            font-size: 42px !important; 
            font-weight: 900 !important;
            line-height: 1 !important;
            margin: 0 !important; 
            display: inline-flex !important;
            align-items: baseline !important;
            justify-content: center !important;
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 0px 4px 8px rgba(0, 0, 0, 0.8) !important;
        }

        .max-total {
            font-size: 15px !important;
            color: #64748b !important; /* Gris oleaje suave */
            font-weight: 600 !important;
            text-shadow: none !important;
            margin-left: 5px !important;
        }

  /* === TABS / FILTROS (Botones con look de engranaje deportivo) === */
        .tabs {
            display: flex;
            gap: 8px; 
            margin-bottom: 20px;
            width: 100%;
            padding: 4px 2px 10px 2px; /* Espaciado extra para que la sombra del botón activo no se corte */
            overflow-x: auto;          /* 🔄 Permite el deslizamiento horizontal si no caben */
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* Scroll ultra suave en celulares */
            box-sizing: border-box;
        }

        /* Oculta la barra de scroll fea en navegadores modernos para mantener el look premium */
        .tabs::-webkit-scrollbar {
            display: none; 
        }
        .tabs {
            -ms-overflow-style: none;  /* IE y Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .tab {
            background-color: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 10px 14px; /* Un pelito más compacto para que entren más Beys de golpe */
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 11.5px; /* Calibrado para alta legibilidad en pantallas chicas */
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            flex-shrink: 0; /* 🔄 Evita que los botones se aplasten o se deformen al achicar la pantalla */
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .tab:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background-color: var(--bg-input);
        }

        .tab.active {
            background: linear-gradient(135deg, #ffffff, #e2e8f0);
            color: #060b13;
            border-color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        /* === BUSCADOR RADICAL === */
        .search-box {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            box-sizing: border-box;
            margin-bottom: 25px;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-bx);
            box-shadow: 
                inset 0 2px 4px rgba(0,0,0,0.3),
                0 0 10px rgba(56, 189, 248, 0.25);
        }

        /* ========================================================
           TARJETAS BEYBLADE (Look de Contenedor de Alta Tecnología)
           ======================================================== */
        .bey-card {
            background: linear-gradient(145deg, var(--bg-card), #0b1424);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .bey-card:hover {
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .bey-header {
            display: flex;
            align-items: center;
            width: 100%;
        }

        /* GRUPO DE CÍRCULOS (Efecto de Encastre de Piezas) */
        .circles-group {
            display: flex;
            gap: 8px;
            width: 65%;
            justify-content: flex-start;
        }

        .circle {
            width: 68px; 
            height: 68px;
            border-radius: 50%;
            background: radial-gradient(circle, #15253f 60%, #0b1424 100%);
            border: 2px solid #233d66;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Brillo de Activación Neon al Marcar Piezas */
        .circle.active-B { border-color: var(--accent-ux); box-shadow: 0 0 12px rgba(251, 191, 36, 0.4); }   
        .circle.active-As { border-color: var(--accent-cx); box-shadow: 0 0 12px rgba(45, 212, 191, 0.4); }          
        .circle.active-R { border-color: #4ade80; box-shadow: 0 0 12px rgba(74, 222, 128, 0.4); }          
        .circle.active-Bi { border-color: var(--accent-bx); box-shadow: 0 0 12px rgba(56, 189, 248, 0.4); } 

        /* Clases de iluminación extras para los círculos de la línea CXI */
        .circle.active-LC { border-color: #ffb703; box-shadow: 0 0 12px rgba(255, 183, 3, 0.4); }
        .circle.active-OB { border-color: #ff007f; box-shadow: 0 0 12px rgba(255, 0, 127, 0.4); }
        .circle.active-MB { border-color: #e0aaff; box-shadow: 0 0 12px rgba(224, 170, 255, 0.4); }

        .circle img {
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease;
        }

/* ========================================================
           💥 OPTIMIZACIÓN EXCLUSIVA PARA LOS 6 CÍRCULOS CXI (60px)
           ======================================================== */
        .grid-cxi {
            width: 65% !important; /* Terreno ideal para tus 6 círculos de 60px */
            gap: 6px !important;   
        }

        .grid-cxi .circle {
            width: 60px !important;  
            height: 60px !important;
        }

        /* Le damos el 35% restante al bloque de información */
        .line-cxi .bey-info {
            width: 35% !important;
        }

        .line-cxi .bey-name {
            font-size: 16px !important; 
            white-space: normal !important;       /* 🔄 PERMITE que el texto continúe abajo */
            word-wrap: break-word !important;     /* Rompe de forma segura si encuentra una palabra gigante */
            overflow-wrap: break-word !important; /* Refuerza el quiebre para que no se salga del contenedor */
        }

        
        .bey-card:hover .circle img {
            transform: rotate(5deg) scale(1.03);
        }

        /* INFORMACIÓN DE LA TARJETA */
        .bey-info {
            display: flex;
            flex-direction: column;
            width: 35%;
            text-align: right;
            justify-content: center;
        }

        .bey-tag {
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .tag-BX { color: var(--accent-bx); }
        .tag-UX { color: var(--accent-ux); }
        .tag-CX, .tag-CXI { color: var(--accent-cx); }

        .bey-name {
            font-size: 19px;
            font-weight: 800;
            margin: 0;
            line-height: 1.2;
            letter-spacing: -0.3px;
            color: #ffffff;
        }

        /* ========================================================
           SECCIÓN DE CHECKBOXES (Paneles de Control de Piezas)
           ======================================================== */
        .checkbox-section {
            background-color: rgba(6, 11, 19, 0.6);
            border: 1px solid rgba(30, 58, 95, 0.5);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 11px;
        }

        .check-item {
            font-size: 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            cursor: pointer;
            line-height: 1.4;
            color: #e2e8f0;
            transition: color 0.15s ease;
        }
        .check-item:hover {
            color: #ffffff;
        }

        .check-item input {
            cursor: pointer;
            width: 17px;
            height: 17px;
            margin: 0;
            margin-top: 1px;
            flex-shrink: 0;
            accent-color: var(--accent-bx); 
        }

        .check-item span {
            white-space: normal; 
            word-break: break-word; 
        }

        /* Colores de las etiquetas de piezas */
        .label-B { color: var(--accent-ux); font-weight: 700; }
        .label-As { color: var(--accent-cx); font-weight: 700; }
        .label-R { color: #4ade80; font-weight: 700; }
        .label-Bi { color: var(--accent-bx); font-weight: 700; }

        /* Barra de scroll de categorías en móviles */
        .tabs::-webkit-scrollbar {
            height: 4px;
        }
        .tabs::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

/* Estilos para el botón de Obtenidos independiente */
        .tab-obtenidos-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .tab.tab-obtenidos {
            width: 100%;                  /* Ocupa el mismo ancho del buscador */
            text-align: center;
            padding: 12px;
            font-size: 13px;              /* Un pelito más grande para destacar */
            border-color: var(--accent-ux); /* Borde dorado de tu paleta Unique Line */
            background-color: rgba(15, 28, 48, 0.4);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* Efecto cuando marcas "Mis Piezas Obtenidas" como activo */
        .tab.tab-obtenidos.active {
            background: linear-gradient(135deg, var(--accent-ux), #d97706);
            color: #060b13;
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- === LOGO OFICIAL DE LA COMUNIDAD === -->
        <div class="logo-wrapper">
            <img src="LOGO.jpg" alt="Beyblade Litoral Logo" class="community-logo">
        </div>

        <h1>Inventario de Piezas Beyblade X</h1>
        <div class="subtitle">By ManuHBK - Beyblade Litoral</div>

        <div class="stats-panel">
            <div class="stat-box">
                <h3>Blades</h3>
                <p id="stat-blades">0</p>
            </div>
            <div class="stat-box">
                <h3>Ratchets</h3>
                <p id="stat-ratchets">0</p>
            </div>
            <div class="stat-box">
                <h3>Bits</h3>
                <p id="stat-bits">0</p>
            </div>



        </div>

        <div class="tabs">
            <div class="tab active" onclick="filtrarLinea('Todos', this)">Todos</div>
            <div class="tab" onclick="filtrarLinea('BX', this)">Basic Line (BX-I)</div>
            <div class="tab" onclick="filtrarLinea('UX', this)">Unique Line (UX-I)</div>
            <div class="tab" onclick="filtrarLinea('CX', this)">Custom Line (CX)</div>
            <div class="tab" onclick="filtrarLinea('CXI', this)">Infinite Line (CXI)</div> 
        </div>

        <!-- 🌟 Botón de acceso rápido exclusivo para tu colección -->
        <div class="tab-obtenidos-wrapper">
            <div class="tab tab-obtenidos" onclick="filtrarLinea('Obtenidos', this)">⭐ Mis Piezas Obtenidas</div>
        
        </div>

        <input type="text" id="search-input" class="search-box" placeholder="🔍 Buscar por Blade, Ratchet o Bit..." oninput="filtrarBusqueda()">

        <div id="beyblades-list"></div>
    </div>

    <script src="beyblades.js"></script>

    <script>
        let piezasMarcadas = JSON.parse(localStorage.getItem('misPiezasX')) || {};
        let filtroActual = 'Todos';

        // DICCIONARIOS DE DEFINICIONES DE PIEZAS
        const DICCIONARIO_BITS = {
            "I": "Ignition", "WW": "Wall Wedge", "Nr": "Narrow",
            "F": "Flat", "T": "Taper", "B": "Ball", "N": "Needle", "HN": "High Needle",
            "LF": "Low Flat", "P": "Point", "O": "Orb", "R": "Rush", "HT": "High Taper",
            "S": "Spike", "GF": "Gear Flat", "Y": "Yielding","GB": "Gear Ball", "GP": "Gear Point",
            "GN": "Gear Needle", "A": "Accel", "DB": "Disc Ball", "H": "Hexa",
            "Q": "Quake", "MN": "Metal Needle", "U": "Unite", "C": "Cyclone",
            "D": "Dot", "G": "Glide", "E": "Elevate", "FB": "Free Ball",
            "BS": "Bound Spike", "RA": "Rubber Accel", "L": "Level", "TP": "Trans Point",
            "LR": "Low Rush", "UN": "Under Needle", "V": "Vortex", "LO": "Low Orb",
            "W": "Wedge", "K": "Kick", "Z": "Zap", "GU": "Gear Unite", "J": "Jolt", "GR": "Gear Rush", "Tr":"Turbo"
        };

        const DICCIONARIO_OVER = {
            "F": "Flow", "B": "Break", "G": "Guard", "O": "Outer", "P": "Peak"
        };

        const DICCIONARIO_METAL = {
            "R": "Rage", "B": "Blitz", "F": "Fortress", "D": "Delta", "W": "Whip"
        };

        const DICCIONARIO_ASSIST = {
            "S": "Slash", "R": "Round", "B": "Bumper", "T": "Turn", "C": "Charge",
            "J": "Jaggy", "A": "Assault", "W": "Wheel", "D": "Dual", "F": "Free",
            "H": "Heavy", "G": "Gravity", "K": "Knuckle", "E": "Erase", "O": "Odd", "Z": "Zillion","V": "Vertical", "M": "Massive"
        };

        function obtenerCatalogo() {
            return typeof BEYBLADES_DB !== 'undefined' ? BEYBLADES_DB : [];
        }

        // === CALCULAR ESTADÍSTICAS COMPLETO ===
        function calcularEstadisticas() {
            let totalBlades = 0;
            let totalRatchets = 0;
            let totalBits = 0;
            
            const lista = obtenerCatalogo(); 
            const maxDisponibles = lista.length; 

            lista.forEach(bey => {
                const marcas = piezasMarcadas[bey.id];
                if (!marcas) return;

                // Para CXI, consideramos la Blade obtenida si tiene el Metal Blade marcado
                if (bey.linea === 'CXI') {
                    if (marcas.metalBlade) totalBlades++;
                } else {
                    if (marcas.blade) totalBlades++;
                }
                
                if (marcas.ratchet && bey.ratchet) totalRatchets++;
                if (marcas.bit && bey.bit) totalBits++;
            });

            document.getElementById('stat-blades').innerHTML = `${totalBlades} <span class="max-total">/ ${maxDisponibles}</span>`;
            document.getElementById('stat-ratchets').innerHTML = `${totalRatchets} <span class="max-total">/ ${maxDisponibles}</span>`;
            document.getElementById('stat-bits').innerHTML = `${totalBits} <span class="max-total">/ ${maxDisponibles}</span>`;
        }

        function togglePieza(beyId, tipo) {
            if (!piezasMarcadas[beyId]) {
                piezasMarcadas[beyId] = { 
                    blade: false, 
                    assist: false, 
                    ratchet: false, 
                    bit: false,
                    lockChip: false,  
                    overBlade: false, 
                    metalBlade: false 
                };
            }
            
            piezasMarcadas[beyId][tipo] = !piezasMarcadas[beyId][tipo];
            localStorage.setItem('misPiezasX', JSON.stringify(piezasMarcadas));
            
            calcularEstadisticas();
            actualizarCirculos(beyId);

            // Si estamos en la pestaña obtenidos y desmarcas todo, actualiza la interfaz
            if (filtroActual === 'Obtenidos') {
                filtrarBusqueda();
            }
        }

        function actualizarCirculos(beyId) {
            const marcas = piezasMarcadas[beyId] || { 
                blade: false, assist: false, ratchet: false, bit: false, 
                lockChip: false, overBlade: false, metalBlade: false 
            };
            
            const cB = document.getElementById(`circle-B-${beyId}`);
            const cAs = document.getElementById(`circle-As-${beyId}`);
            const cR = document.getElementById(`circle-R-${beyId}`);
            const cBi = document.getElementById(`circle-Bi-${beyId}`);
            
            const cLC = document.getElementById(`circle-LC-${beyId}`);
            const cOB = document.getElementById(`circle-OB-${beyId}`);
            const cMB = document.getElementById(`circle-MB-${beyId}`);
            
            if(cB) {
                if(marcas.blade) cB.classList.add('active-B');
                else cB.classList.remove('active-B');
            }
            if(cAs) {
                if(marcas.assist) cAs.classList.add('active-As');
                else cAs.classList.remove('active-As');
            }
            if(cR) {
                if(marcas.ratchet) cR.classList.add('active-R');
                else cR.classList.remove('active-R');
            }
            if(cBi) {
                if(marcas.bit) cBi.classList.add('active-Bi');
                else cBi.classList.remove('active-Bi');
            }
            
            if(cLC) {
                if(marcas.lockChip) cLC.classList.add('active-LC'); 
                else cLC.classList.remove('active-LC');
            }
            if(cOB) {
                if(marcas.overBlade) cOB.classList.add('active-OB');
                else cOB.classList.remove('active-OB');
            }
            if(cMB) {
                if(marcas.metalBlade) cMB.classList.add('active-MB');
                else cMB.classList.remove('active-MB');
            }
        }

        function filtrarLinea(linea, elemento) {
            filtroActual = linea;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (elemento) {
                elemento.classList.add('active');
            }
            filtrarBusqueda();
        }

        function filtrarBusqueda() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const lista = obtenerCatalogo();
            
            let filtrados = lista.filter(bey => {
                const lineaBey = (bey.linea || 'BX').toUpperCase();
                const filtro = filtroActual.toUpperCase();

                if (filtro === 'OBTENIDOS') {
                    const marcas = piezasMarcadas[bey.id];
                    if (!marcas) return false;
                    
                    return marcas.blade || marcas.ratchet || marcas.bit || marcas.assist || 
                           marcas.lockChip || marcas.overBlade || marcas.metalBlade;
                }

                return (filtro === 'TODOS') || 
                       (filtro === 'CX' && (lineaBey === 'CX' || lineaBey === 'CXI')) || 
                       (lineaBey === filtro);
            });

            if (query !== '') {
                filtrados = filtrados.filter(bey => {
                    const nombreBitCompleto = DICCIONARIO_BITS[bey.bit] ? DICCIONARIO_BITS[bey.bit].toLowerCase() : '';
                    const nombreAssistCompleto = DICCIONARIO_ASSIST[bey.assistBlade] ? DICCIONARIO_ASSIST[bey.assistBlade].toLowerCase() : '';
                    const nombreMetalCompleto = DICCIONARIO_METAL[bey.metalBlade] ? DICCIONARIO_METAL[bey.metalBlade].toLowerCase() : '';
                    const nombreOverCompleto = DICCIONARIO_OVER[bey.overBlade] ? DICCIONARIO_OVER[bey.overBlade].toLowerCase() : '';

                    const nombreBey = (bey.nombre || '').toLowerCase();
                    const idBey = (bey.id || '').toLowerCase();
                    const bladeBey = (bey.blade || '').toLowerCase();
                    const ratchetBey = (bey.ratchet || '').toLowerCase();
                    const bitSigla = (bey.bit || '').toLowerCase();

                    return nombreBey.includes(query) || 
                           idBey.includes(query) || 
                           bladeBey.includes(query) ||
                           ratchetBey.includes(query) ||
                           bitSigla.includes(query) || 
                           nombreBitCompleto.includes(query) ||
                           nombreAssistCompleto.includes(query) ||
                           nombreMetalCompleto.includes(query) ||
                           nombreOverCompleto.includes(query);
                });
            }

            renderList(filtrados);
        }
        
        function renderList(beysAFiltrar) {
            const container = document.getElementById('beyblades-list');
            container.innerHTML = '';

            if (beysAFiltrar.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align:center; padding:20px;">No se encontraron Beyblades en esta línea.</p>';
                return;
            }

            beysAFiltrar.forEach(bey => {
                const marcas = piezasMarcadas[bey.id] || { 
                    blade: false, assist: false, ratchet: false, bit: false,
                    lockChip: false, overBlade: false, metalBlade: false 
                };
                
                const lineaSegura = bey.linea || 'BX';
                const nombreSeguro = bey.nombre || 'Modelo Desconocido';

                const siglaBit = bey.bit || 'N/A';
                const nombreLargoBit = DICCIONARIO_BITS[siglaBit];
                const textoBit = nombreLargoBit ? `${siglaBit} <span style="color: var(--text-secondary); font-size: 0.78rem; font-weight: normal;">(${nombreLargoBit})</span>` : siglaBit;

                const card = document.createElement('div');
                card.className = `bey-card line-${lineaSegura.toLowerCase()}`;
                card.id = `card-${bey.id}`;

                // ==========================================================
                // 🔥 CASO EXCLUSIVO: LÍNEA CXI (INFINITE LINE) - 6 PIEZAS
                // ==========================================================
                if (lineaSegura === 'CXI') {
                    const imgLC = bey.imgLockChip ? `<img src="${bey.imgLockChip}" style="object-fit: cover;">` : '-';
                    const imgOB = bey.imgOverBlade ? `<img src="${bey.imgOverBlade}" style="object-fit: cover;">` : '-';
                    const imgMB = bey.imgMetalBlade ? `<img src="${bey.imgMetalBlade}" style="object-fit: cover;">` : '-';
                    const imgAs = bey.imgAssist ? `<img src="${bey.imgAssist}" style="object-fit: cover;">` : '-';
                    const imgR = bey.imgRatchet ? `<img src="${bey.imgRatchet}" style="object-fit: contain; padding: 4px; box-sizing: border-box;">` : '-';
                    const imgBi = bey.imgBit ? `<img src="${bey.imgBit}" style="object-fit: contain; padding: 4px; box-sizing: border-box;">` : '-';

                    card.innerHTML = `
                        <div class="bey-header">
                            <div class="circles-group grid-cxi">
                                <div id="circle-LC-${bey.id}" class="circle ${marcas.lockChip ? 'active-LC' : ''}">${imgLC}</div>
                                <div id="circle-OB-${bey.id}" class="circle ${marcas.overBlade ? 'active-OB' : ''}">${imgOB}</div>
                                <div id="circle-MB-${bey.id}" class="circle ${marcas.metalBlade ? 'active-MB' : ''}">${imgMB}</div>
                                <div id="circle-As-${bey.id}" class="circle ${marcas.assist ? 'active-As' : ''}">${imgAs}</div>
                                <div id="circle-R-${bey.id}" class="circle ${marcas.ratchet ? 'active-R' : ''}">${imgR}</div>
                                <div id="circle-Bi-${bey.id}" class="circle ${marcas.bit ? 'active-Bi' : ''}">${imgBi}</div>
                            </div>
                            <div class="bey-info">
                                <span class="bey-tag tag-${lineaSegura}">[${lineaSegura}] ${bey.id}</span>
                                <h3 class="bey-name">${nombreSeguro}</h3>
                            </div>
                        </div>

                        <div class="checkbox-section">
                            <label class="check-item">
                                <input type="checkbox" ${marcas.lockChip ? 'checked' : ''} onclick="togglePieza('${bey.id}', 'lockChip')">
                                <span><span class="label-LC" style="color: #ffb703; font-weight: bold;">LC:</span> ${bey.lockChip || 'N/A'}</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" ${marcas.overBlade ? 'checked' : ''} onclick="togglePieza('${bey.id}', 'overBlade')">
                                <span><span class="label-OB" style="color: #ff007f; font-weight: bold;">OB:</span> ${bey.overBlade || 'N/A'}</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" ${marcas.metalBlade ? 'checked' : ''} onclick="togglePieza('${bey.id}', 'metalBlade')">
                                <span><span class="label-MB" style="color: #e0aaff; font-weight: bold;">MB:</span> ${bey.metalBlade || 'N/A'}</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" ${marcas.assist ? 'checked' : ''} onclick="togglePieza('${bey.id}', 'assist')">
                                <span><span class="label-As" style="color: #72efdd; font-weight: bold;">A:</span> ${bey.assistBlade || 'N/A'}</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" ${marcas.ratchet ? 'checked' : ''} onclick="togglePieza('${bey.id}', 'ratchet')">
                                <span><span class="label-R">R:</span> ${bey.ratchet || 'N/A'}</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" ${marcas.bit ? 'checked' : ''} onclick="togglePieza('${bey.id}', 'bit')">
                                <span><span class="label-Bi">Bi:</span> ${textoBit}</span>
                            </label>
                        </div>
                    `;
                } 
                // ==========================================================
                // 🚫 MANTENER INTACTO: LÍNEAS TRADICIONALES (BX, UX, CX)
                // ==========================================================
                else {
                    const imgB = bey.imgBlade ? `<img src="${bey.imgBlade}" style="object-fit: cover;">` : '-';
                    const imgR = bey.imgRatchet ? `<img src="${bey.imgRatchet}" style="object-fit: contain; padding: 6px; box-sizing: border-box;">` : '-';
                    const imgBi = bey.imgBit ? `<img src="${bey.imgBit}" style="object-fit: contain; padding: 6px; box-sizing: border-box;">` : '-';

                    let circuloAssistHtml = '';
                    let checkboxAssistHtml = '';
                    
                    if (lineaSegura === 'CX' && bey.assistBlade) {
                        const imgAs = bey.imgAssist ? `<img src="${bey.imgAssist}" style="object-fit: cover;">` : '-';
                        circuloAssistHtml = `<div id="circle-As-${bey.id}" class="circle ${marcas.assist ? 'active-As' : ''}">${imgAs}</div>`;
                        
                        const siglaAssist = bey.assistBlade || 'N/A';
                        const nombreLargoAssist = DICCIONARIO_ASSIST[siglaAssist];
                        const textoAssist = nombreLargoAssist ? `${siglaAssist} <span style="color: var(--text-secondary); font-size: 0.78rem; font-weight: normal;">(${nombreLargoAssist})</span>` : siglaAssist;

                        checkboxAssistHtml = `
                            <label class="check-item">
                                <input type="checkbox" ${marcas.assist ? 'checked' : ''} onclick="togglePieza('${bey.id}', 'assist')">
                                <span><span class="label-As" style="color: #72efdd; font-weight: bold;">A:</span> ${textoAssist}</span>
                            </label>
                        `;
                    }

                    card.innerHTML = `
                        <div class="bey-header">
                            <div class="circles-group">
                                <div id="circle-B-${bey.id}" class="circle ${marcas.blade ? 'active-B' : ''}">${imgB}</div>
                                ${circuloAssistHtml}
                                <div id="circle-R-${bey.id}" class="circle ${marcas.ratchet ? 'active-R' : ''}">${imgR}</div>
                                <div id="circle-Bi-${bey.id}" class="circle ${marcas.bit ? 'active-Bi' : ''}">${imgBi}</div>
                            </div>
                            <div class="bey-info">
                                <span class="bey-tag tag-${lineaSegura}">[${lineaSegura}] ${bey.id}</span>
                                <h3 class="bey-name">${nombreSeguro}</h3>
                            </div>
                        </div>

                        <div class="checkbox-section">
                            <label class="check-item">
                                <input type="checkbox" ${marcas.blade ? 'checked' : ''} onclick="togglePieza('${bey.id}', 'blade')">
                                <span><span class="label-B">B:</span> ${bey.blade || 'N/A'}</span>
                            </label>
                            ${checkboxAssistHtml}
                            <label class="check-item">
                                <input type="checkbox" ${marcas.ratchet ? 'checked' : ''} onclick="togglePieza('${bey.id}', 'ratchet')">
                                <span><span class="label-R">R:</span> ${bey.ratchet || 'N/A'}</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" ${marcas.bit ? 'checked' : ''} onclick="togglePieza('${bey.id}', 'bit')">
                                <span><span class="label-Bi">Bi:</span> ${textoBit}</span>
                            </label>
                        </div>
                    `;
                }

                container.appendChild(card);
            });
        } // <--- AQUÍ CIERRA CORRECTAMENTE RENDERLIST

        // === ENTRADA AUTOMÁTICA AL CARGAR LA PÁGINA (UBICACIÓN CORRECTA) ===
        window.addEventListener('DOMContentLoaded', () => {
            piezasMarcadas = JSON.parse(localStorage.getItem('misPiezasX')) || {};
            
            const lista = obtenerCatalogo();
            if (lista.length > 0) {
                filtroActual = 'Todos';
                filtrarBusqueda();
                calcularEstadisticas();
            } else {
                document.getElementById('beyblades-list').innerHTML = 
                    '<p style="color: var(--text-secondary); text-align:center; padding:20px;">Error al cargar beyblades.js o base de datos vacía.</p>';
            }
        });
    </script>
</body>
</html>
